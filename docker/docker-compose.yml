services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel
      POSTGRES_DB: sentinel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: ..
      dockerfile: db/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://sentinel:sentinel@postgres:5432/sentinel
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: ..
      dockerfile: backend/api/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://sentinel:sentinel@postgres:5432/sentinel
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  scheduler:
    build:
      context: ..
      dockerfile: backend/scheduler/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://sentinel:sentinel@postgres:5432/sentinel
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  worker:
    build:
      context: ..
      dockerfile: backend/worker/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://sentinel:sentinel@postgres:5432/sentinel
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    deploy:
      replicas: 2

  health_monitor:
    build:
      context: ..
      dockerfile: backend/health_monitor/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://sentinel:sentinel@postgres:5432/sentinel
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
